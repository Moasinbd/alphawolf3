# ─────────────────────────────────────────────────────────────
# Risk Limits — risk-engine-rust configuration
# All values are hard limits. Violating any → order rejected.
# ─────────────────────────────────────────────────────────────

portfolio:
  max_drawdown_pct: 10.0        # halt trading if drawdown exceeds 10%
  max_gross_exposure_pct: 80.0  # max % of capital deployed at once
  max_daily_loss_usd: 500.0     # hard stop after losing $500 in a day

position:
  max_size_pct: 10.0            # no single position > 10% of capital
  max_qty_per_order: 1000       # hard cap on shares per single order
  min_confidence: 0.60          # reject signals below 60% confidence

order:
  min_order_value_usd: 100.0    # no micro orders
  max_order_value_usd: 5000.0   # no single order > $5000

# Symbols that can never be traded (blacklist)
blacklist: []

# Only these symbols are allowed (empty = all allowed)
whitelist:
  - AAPL
  - TSLA
  - NVDA
  - SPY
  - QQQ
  - BTCUSD
  - ETHUSD
